<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Console — KARTHIK×CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=switzer@400,500,600,700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/core.css">
</head>
<body>

<div class="loading-shell" id="loadingShell"><span class="mono">// verifying access…</span></div>

<div id="pageContent" style="display:none;">
  <header class="app-header">
    <div class="brand"><span class="brand-mark"></span>KARTHIK<span class="x">×</span>CORE</div>
    <nav class="app-nav">
      <a href="profile.html">PROFILE</a>
      <a href="console.html">CONSOLE</a>
    </nav>
    <div class="status-pip"><span class="dot"></span><span id="modeStatus">MODE: STANDARD</span><button class="signout mono" id="signOutBtn">sign out</button></div>
  </header>

  <main>
    <section>
      <div class="page-head reveal">
        <div class="tag">[CONSOLE]</div>
        <h1>Talk to CORE.</h1>
      </div>
      <div class="terminal reveal">
        <div class="term-chrome">
          <span class="term-dot" style="background:#FF5F56;"></span>
          <span class="term-dot" style="background:#FFBD2E;"></span>
          <span class="term-dot" style="background:#27C93F;"></span>
          <span class="term-title">core@karthik — console</span>
        </div>
        <div class="term-tabs" id="modeTabs"></div>
        <div class="term-desc" id="modeDesc"></div>
        <div class="term-log" id="chatWindow"><div class="empty-log">// nothing here yet — say something</div></div>
        <div class="clear-thread" id="clearThread">clear thread (this view only)</div>
        <div class="term-input-row">
          <span class="prompt-glyph">❯</span>
          <input type="text" id="chatInput" placeholder="type a message…" autocomplete="off" maxlength="2000">
          <span class="char-count" id="charCount"></span>
          <button class="send-btn" id="sendBtn">↵</button>
        </div>
      </div>
    </section>

    <footer>
      <div class="foot-brand">KARTHIK×CORE — private build, all rights reserved.</div>
      <div class="foot-links">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
      </div>
    </footer>
  </main>
</div>

<script src="js/common.js"></script>
<script>
const MODES = {
  low:      { label:"LOW",      tier:"Fast & light",     desc:"Quick, punchy answers — one or two lines unless you ask for more." },
  medium:   { label:"MEDIUM",   tier:"Balanced",          desc:"A middle ground — enough detail to be useful without dragging on." },
  standard: { label:"STANDARD", tier:"Default",           desc:"CORE's well-rounded voice — clear explanations, examples when it helps." },
  high:     { label:"HIGH",     tier:"Deepest reasoning", desc:"Takes its time on harder questions — thorough and precise." }
};

let currentMode = "standard";
let accessKey = null;
let sending = false;

async function apiFetch(url, opts = {}){
  opts.headers = Object.assign({ 'x-access-key': accessKey }, opts.headers || {});
  return fetch(url, opts);
}

function initConsole(){
  const tabs = document.getElementById('modeTabs');
  tabs.innerHTML = '';
  Object.keys(MODES).forEach(key => {
    const m = MODES[key];
    const btn = document.createElement('button');
    btn.className = 'term-tab' + (key===currentMode ? ' active' : '');
    btn.innerHTML = `<span class="mono">${m.label}</span><span class="tt-sub mono">${m.tier}</span>`;
    btn.addEventListener('click', () => switchMode(key));
    tabs.appendChild(btn);
  });
  document.getElementById('modeDesc').textContent = '// ' + MODES[currentMode].desc;
  document.getElementById('modeStatus').textContent = 'MODE: ' + MODES[currentMode].label;
  loadThread(currentMode);
}

async function switchMode(key){ currentMode = key; initConsole(); }

async function loadThread(mode){
  const win = document.getElementById('chatWindow');
  win.innerHTML = '<div class="empty-log">// loading…</div>';
  try{
    const res = await apiFetch(`/api/chat?mode=${mode}`);
    if(res.status === 401){ localStorage.removeItem('core_key'); window.location.href = 'index.html'; return; }
    const data = await res.json();
    renderThread(data.history || []);
  }catch(e){ renderThread([]); }
}

function renderThread(thread){
  const win = document.getElementById('chatWindow');
  if(!thread || thread.length === 0){
    win.innerHTML = `<div class="empty-log">// nothing here yet — say something to ${MODES[currentMode].label}</div>`;
    return;
  }
  win.innerHTML = '';
  thread.forEach(m => {
    const div = document.createElement('div');
    div.className = 'log-line ' + (m.role==='user' ? 'user' : 'bot');
    div.innerHTML = `<span class="log-prefix mono">${m.role==='user'?'❯':'CORE ▸'}</span><span class="log-text"></span>`;
    div.querySelector('.log-text').textContent = m.text;
    win.appendChild(div);
  });
  win.scrollTop = win.scrollHeight;
}

const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const charCount = document.getElementById('charCount');

chatInput.addEventListener('input', () => {
  charCount.textContent = chatInput.value.length > 1500 ? `${chatInput.value.length}/2000` : '';
});
sendBtn.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => { if(e.key==='Enter') sendMessage(); });
document.getElementById('clearThread').addEventListener('click', () => {
  renderThread([]);
  showToast("thread cleared (view only — history stays on the server).");
});

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || sending) return;
  sending = true;
  sendBtn.disabled = true;
  chatInput.value = '';
  charCount.textContent = '';

  const win = document.getElementById('chatWindow');
  if(win.querySelector('.empty-log')) win.innerHTML = '';
  const userDiv = document.createElement('div');
  userDiv.className = 'log-line user';
  userDiv.innerHTML = `<span class="log-prefix mono">❯</span><span class="log-text"></span>`;
  userDiv.querySelector('.log-text').textContent = text;
  win.appendChild(userDiv);

  const typing = document.createElement('div');
  typing.className = 'typing-line';
  typing.innerHTML = '<span></span><span></span><span></span>';
  win.appendChild(typing);
  win.scrollTop = win.scrollHeight;

  try{
    const res = await apiFetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ mode: currentMode, message: text })
    });
    if(res.status === 401){ localStorage.removeItem('core_key'); window.location.href = 'index.html'; return; }
    if(res.status === 429){
      typing.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'log-line bot error';
      errDiv.innerHTML = `<span class="log-prefix mono">CORE ▸</span><span class="log-text">sending too fast — give it a few seconds.</span>`;
      win.appendChild(errDiv);
      return;
    }
    const data = await res.json();
    typing.remove();
    renderThread(data.history || []);
  }catch(e){
    typing.remove();
    const errDiv = document.createElement('div');
    errDiv.className = 'log-line bot error';
    errDiv.innerHTML = `<span class="log-prefix mono">CORE ▸</span><span class="log-text">signal dropped — check connection and try again.</span>`;
    win.appendChild(errDiv);
  } finally {
    sending = false;
    sendBtn.disabled = false;
  }
}

(async function(){
  const key = await requireAccessKey();
  if(!key) return;
  accessKey = key;
  document.getElementById('loadingShell').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';
  markActiveNav();
  wireSignOut();
  document.querySelectorAll('.reveal').forEach(e => e.classList.add('in'));
  initConsole();
})();
</script>
</body>
</html>
