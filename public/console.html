<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Console — KARTHIK×CORE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=switzer@400,500,600,700&display=swap">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/core.css">
</head>
<body>

<div class="loading-shell" id="loadingShell"><span class="mono">// verifying access…</span></div>

<div id="pageContent" style="display:none;">
  <header class="app-header">
    <div class="brand"><span class="brand-mark"></span>KARTHIK<span class="x">×</span>CORE</div>
    <nav class="app-nav">
      <a href="profile.html">PROFILE</a>
      <a href="console.html">CONSOLE</a>
    </nav>
    <div class="status-pip"><span class="dot"></span><span id="modeStatus">MODE: STANDARD</span><button class="signout mono" id="signOutBtn">sign out</button></div>
  </header>

  <main>
    <section class="console-section">
      <div class="page-head reveal">
        <div class="tag">[CONSOLE]</div>
        <h1>Talk to CORE.</h1>
      </div>

      <div class="terminal reveal">
        <div class="mode-switch" id="modeTabs" role="tablist"></div>
        <div class="mode-caption" id="modeDesc"></div>

        <div class="chat-shell">
          <div class="term-log" id="chatWindow"></div>

          <div class="term-foot">
            <div class="clear-thread" id="clearThread">clear thread</div>
            <div class="composer-box">
              <textarea id="chatInput" rows="1" placeholder="Message CORE…" maxlength="2000"></textarea>
              <button class="send-btn" id="sendBtn" aria-label="Send" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
              </button>
            </div>
            <div class="composer-hint">
              <span>Enter to send · Shift+Enter for a new line</span>
              <span id="charCount"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="foot-brand">KARTHIK×CORE — private build, all rights reserved.</div>
      <div class="foot-links">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
      </div>
    </footer>
  </main>
</div>

<script src="js/common.js"></script>
<script>
const MODES = {
  low:      { label:"LOW",      tier:"Fast & light",     desc:"Quick, punchy answers — one or two lines unless you ask for more." },
  medium:   { label:"MEDIUM",   tier:"Balanced",          desc:"A middle ground — enough detail to be useful without dragging on." },
  standard: { label:"STANDARD", tier:"Default",           desc:"CORE's well-rounded voice — clear explanations, examples when it helps." },
  high:     { label:"HIGH",     tier:"Deepest reasoning", desc:"Takes its time on harder questions — thorough and precise." }
};

let currentMode = "standard";
let accessKey = null;
let sending = false;

async function apiFetch(url, opts = {}){
  opts.headers = Object.assign({ 'x-access-key': accessKey }, opts.headers || {});
  return fetch(url, opts);
}

/* ---- tiny, safe markdown-lite renderer (escape first, then allow only
   the tags we generate ourselves — bold, italic, inline code, links, lists) ---- */
function renderRichText(raw){
  let s = escapeHtml(raw);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s<)]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');

  const lines = s.split('\n');
  let out = [], inList = false;
  for(const line of lines){
    if(/^\s*[-*]\s+/.test(line)){
      if(!inList){ out.push('<ul>'); inList = true; }
      out.push('<li>' + line.replace(/^\s*[-*]\s+/, '') + '</li>');
    } else {
      if(inList){ out.push('</ul>'); inList = false; }
      out.push(line === '' ? '<br>' : '<p>' + line + '</p>');
    }
  }
  if(inList) out.push('</ul>');
  return out.join('');
}

function initConsole(){
  const tabs = document.getElementById('modeTabs');
  tabs.innerHTML = '';
  Object.keys(MODES).forEach(key => {
    const m = MODES[key];
    const btn = document.createElement('button');
    btn.className = 'mode-pill' + (key===currentMode ? ' active' : '');
    btn.textContent = m.label;
    btn.setAttribute('role','tab');
    btn.setAttribute('aria-selected', key===currentMode ? 'true' : 'false');
    btn.addEventListener('click', () => switchMode(key));
    tabs.appendChild(btn);
  });
  document.getElementById('modeDesc').textContent = MODES[currentMode].desc;
  document.getElementById('modeStatus').textContent = 'MODE: ' + MODES[currentMode].label;
  loadThread(currentMode);
}

async function switchMode(key){ currentMode = key; initConsole(); }

async function loadThread(mode){
  const win = document.getElementById('chatWindow');
  win.innerHTML = '<div class="empty-state"><span class="es-mark">›_</span>loading…</div>';
  try{
    const res = await apiFetch(`/api/chat?mode=${mode}`);
    if(res.status === 401){ localStorage.removeItem('core_key'); window.location.href = 'index.html'; return; }
    const data = await res.json();
    renderThread(data.history || []);
  }catch(e){ renderThread([]); }
}

function emptyStateHtml(){
  return `<div class="empty-state"><span class="es-mark">›_</span>Nothing here yet — say something to ${MODES[currentMode].label}.</div>`;
}

function buildMsgEl(role, text){
  const isUser = role === 'user';
  const row = document.createElement('div');
  row.className = 'msg ' + (isUser ? 'user' : 'assistant');

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = isUser ? 'Y' : 'C';

  const body = document.createElement('div');
  body.className = 'msg-body';

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = isUser ? 'You' : 'CORE';

  const content = document.createElement('div');
  content.className = 'msg-content';
  if(isUser){
    content.textContent = text;
  } else {
    content.innerHTML = renderRichText(text);
  }

  body.appendChild(roleEl);
  body.appendChild(content);

  if(!isUser){
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.type = 'button';
    copyBtn.setAttribute('aria-label', 'Copy message');
    copyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(text);
      copyBtn.classList.add('copied');
      showToast('copied!');
      setTimeout(() => copyBtn.classList.remove('copied'), 1200);
    });
    actions.appendChild(copyBtn);
    body.appendChild(actions);
  }

  row.appendChild(avatar);
  row.appendChild(body);
  return row;
}

function renderThread(thread){
  const win = document.getElementById('chatWindow');
  if(!thread || thread.length === 0){
    win.innerHTML = emptyStateHtml();
    return;
  }
  win.innerHTML = '';
  thread.forEach(m => win.appendChild(buildMsgEl(m.role === 'user' ? 'user' : 'bot', m.text)));
  win.scrollIntoView({ block:'end' });
}

const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const charCount = document.getElementById('charCount');

function autoResize(){
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
}
function updateSendState(){
  sendBtn.disabled = chatInput.value.trim().length === 0 || sending;
}
chatInput.addEventListener('input', () => {
  autoResize();
  updateSendState();
  charCount.textContent = chatInput.value.length > 1500 ? `${chatInput.value.length}/2000` : '';
});
chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

document.getElementById('clearThread').addEventListener('click', () => {
  document.getElementById('chatWindow').innerHTML = emptyStateHtml();
  showToast("thread cleared (view only — history stays on the server).");
});

async function sendMessage(){
  const text = chatInput.value.trim();
  if(!text || sending) return;
  sending = true;
  updateSendState();
  chatInput.value = '';
  autoResize();
  charCount.textContent = '';

  const win = document.getElementById('chatWindow');
  const emptyEl = win.querySelector('.empty-state');
  if(emptyEl) emptyEl.remove();
  win.appendChild(buildMsgEl('user', text));

  const typing = document.createElement('div');
  typing.className = 'msg assistant typing-row';
  typing.innerHTML = `<div class="msg-avatar">C</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  win.appendChild(typing);
  typing.scrollIntoView({ block:'end' });

  try{
    const res = await apiFetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ mode: currentMode, message: text })
    });
    if(res.status === 401){ localStorage.removeItem('core_key'); window.location.href = 'index.html'; return; }
    if(res.status === 429){
      typing.remove();
      const err = buildMsgEl('bot', 'sending too fast — give it a few seconds.');
      err.classList.add('error');
      win.appendChild(err);
      return;
    }
    const data = await res.json();
    typing.remove();
    renderThread(data.history || []);
  }catch(e){
    typing.remove();
    const err = buildMsgEl('bot', 'signal dropped — check connection and try again.');
    err.classList.add('error');
    win.appendChild(err);
  } finally {
    sending = false;
    updateSendState();
  }
}

(async function(){
  const key = await requireAccessKey();
  if(!key) return;
  accessKey = key;
  document.getElementById('loadingShell').style.display = 'none';
  document.getElementById('pageContent').style.display = 'block';
  markActiveNav();
  wireSignOut();
  document.querySelectorAll('.reveal').forEach(e => e.classList.add('in'));
  initConsole();
})();
</script>
</body>
</html>
